name: Auto Scraper
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间早上 8:00 运行
  workflow_dispatch:      # 【新增】允许你在 Actions 页面点按钮直接运行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 解决 2026 年 Node.js 20 弃用问题

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        env:
          # 【关键】从 GitHub Secrets 读取加密的代理地址
          MY_PROXY: ${{ secrets.PROXY_URL }} 
        run: |
          python scraper.py
          if [ ! -f index.html ]; then
            echo "错误：index.html 未生成！"
            exit 1
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true # 确保文件同步最彻底
