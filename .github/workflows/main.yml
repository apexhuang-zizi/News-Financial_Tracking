name: Daily News Scraper & Email

on:
  workflow_dispatch: # 手动触发
  schedule:
    # 每天 UTC 时间 01:00 运行，即北京时间 09:00
    - cron: '0 1 * * *'

permissions:
  contents: write # 允许机器人提交代码
  pages: write     # 允许更新网页
  id-token: write  # 用于安全验证

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 关键：获取完整历史，防止 rebase 失败

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Scraper
        env:
          MY_PROXY_URL: ${{ secrets.PROXY_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 增加这一行
        run: python scraper.py

      - name: Commit and Push update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 确保拉取最新状态，防止版本脱节
          git fetch origin main
          git checkout main
          
          git add index.html
          
          # 检查是否有内容变化，没变化就直接跳过，不报错
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Auto-update trends: $(date)"
          # 使用强力推送，确保以机器人生成的结果为准
          git push origin main --force
          
      - name: Send Email Notification
        if: success() # 只有上面成功了才发邮件
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com   # ✅ 已补全 QQ 邮箱 SMTP 服务器
          server_port: 465              # ✅ QQ 邮箱 SSL 端口
          secure: true                  # ✅ 启用 SSL
          username: ${{ secrets.MAIL_USERNAME }} # QQ号
          password: ${{ secrets.MAIL_PASSWORD }} # QQ邮箱授权码
          subject: 🚀 每日技术趋势报告 (Hacker News)
          to: ${{ secrets.MAIL_RECEIVER }}
          from: "Trend Monitor <${{ secrets.MAIL_USERNAME }}>"
          body: |
            你好！
            
            今天的技术资讯已经抓取完成，并已同步至你的网页。
            
            查看链接：https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          attachments: index.html
