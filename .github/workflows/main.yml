name: Auto Scraper
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: # 允许手动点击按钮测试

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        env:
          # 此处必须与您网页上的 Secret 名称 PROXY_URL 严格一致
          MY_PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          python scraper.py

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
