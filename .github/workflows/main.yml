name: Auto Scraper
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

# 强制使用 Node.js 24 并赋予写入权限
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        run: |
          python scraper.py
          # 检查文件是否真的生成了
          if [ ! -f index.html ]; then
            echo "错误：index.html 未生成！"
            exit 1
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4 # 升级到 v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
