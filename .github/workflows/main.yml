name: Daily News Scraper & Email

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: write 
  pages: write     
  id-token: write  

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests
          pip install -q -U google-generativeai 

      - name: Execute Scraper
        env:
          MY_PROXY_URL: ${{ secrets.PROXY_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      # --- 关键：直接将生成的 index.html 提交到仓库 ---
      - name: Commit and Push update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          # 如果内容没变，直接跳过，不报错
          git commit -m "Auto-update trends: $(date)" || exit 0
          # 使用 --force 强制覆盖远程，永不报错冲突
          git push origin main --force

      # --- 关键：直接触发网页发布（无需等待） ---
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Email Notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 🚀 每日技术趋势报告 (包含 AI 翻译)
          to: ${{ secrets.MAIL_RECEIVER }}
          from: "Trend Monitor <${{ secrets.MAIL_USERNAME }}>"
          body: |
            你好！今天的技术资讯（含 Gemini 翻译）已更新。
            网页链接：https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          attachments: index.html
